<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>مشكلة |AL-Hossam Hassn</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="container">
    <nav class="nav">
      <a class="logo" href="index.html"><span class="logo-badge"></span>AL-Hossam Hassn</a>
      <ul class="nav-links">
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="stages.html">المراحل</a></li>
        <li><a href="activities.html">الأنشطة</a></li>
        <li><a href="platform.html">المنصة</a></li>
        <li><a href="about.html">من أنا</a></li>
        <li><a href="contact.html">تواصل</a></li>
      </ul>
    </nav>
  </div>
</header>

<main class="container">
  <section class="section">
    <a class="btn" id="backBtn" href="stages.html">رجوع</a>

    <div class="problem-head">
      <div class="problem-cover">
        <img id="coverImg" src="images/placeholder.jpg" alt="غلاف">
      </div>

      <div class="hero-card" style="margin-top:12px;">
        <span class="tag" id="stageTag">—</span>
        <h2 id="problemTitle" style="margin:10px 0 8px;">عنوان المشكلة</h2>
        <p id="problemExcerpt">وصف قصير…</p>
      </div>
    </div>

    <div class="info-grid" id="infoGrid"></div>

    <div class="hero-card" style="margin-top:14px;">
      <h3 style="margin:0 0 8px;">لو محتاج مساعدة خاصة</h3>
      <p style="margin:0;">
        ابعت عمر الطفل + وصف الموقف من صفحة <a href="contact.html">تواصل</a>.
      </p>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container">© <span id="year"></span> AL-Hossam Hassn</div>
</footer>

<script src="js/app.js"></script>
<script src="js/problems-data.js"></script>
<script src="js/stages-data.js"></script>
<script>
  function getParam(name){ return new URLSearchParams(location.search).get(name); }
  const id = getParam("id");

  const titleEl = document.getElementById("problemTitle");
  const excerptEl = document.getElementById("problemExcerpt");
  const coverEl = document.getElementById("coverImg");
  const tagEl = document.getElementById("stageTag");
  const grid = document.getElementById("infoGrid");
  const backBtn = document.getElementById("backBtn");

  const problems = Array.isArray(window.PROBLEMS) ? window.PROBLEMS : [];
  const prob = problems.find(p => p && p.id === id);

  function makeList(items){
    const ul = document.createElement("ul");
    ul.style.margin = "8px 0 0";
    ul.style.paddingRight = "18px";
    ul.style.lineHeight = "1.9";
    (items || []).forEach(text => {
      const li = document.createElement("li");
      li.textContent = text;
      ul.appendChild(li);
    });
    return ul;
  }

  function addCard(title, items){
    const card = document.createElement("div");
    card.className = "info-card";

    const h3 = document.createElement("h3");
    const span = document.createElement("span");
    span.style.opacity = ".7";
    span.textContent = "اضغط للعرض";
    h3.textContent = title;
    h3.appendChild(span);

    const content = document.createElement("p"); // هنحط جواه UL
    content.innerHTML = ""; // فاضي مبدئيًا
    const list = makeList(items);
    content.appendChild(list);

    card.appendChild(h3);
    card.appendChild(content);

    card.addEventListener("click", () => {
      card.classList.toggle("open");
    });

    grid.appendChild(card);
  }

  if(!prob){
    document.title = "المحتوى غير موجود | AL-Hossam Hassn";
    titleEl.textContent = "المحتوى غير موجود";
    excerptEl.textContent = "الرابط غير صحيح أو المشكلة لم تُضف بعد.";
    tagEl.textContent = "—";
    addCard("الأعراض", ["سيتم إضافة المحتوى قريبًا."]);
    addCard("ليه ده بيحصل؟", ["—"]);
    addCard("الحل العملي", ["—"]);
    addCard("ملاحظة", ["—"]);
  } else {
    document.title = prob.title + " | AL-Hossam Hassn";
    titleEl.textContent = prob.title;
    excerptEl.textContent = prob.excerpt || "";
    coverEl.src = prob.cover || "images/placeholder.jpg";
    coverEl.alt = prob.title;
    tagEl.textContent = prob.stageLabel  (prob.stage || "");

    // زر الرجوع للمرحلة
    if (prob.stage){
      backBtn.href = "stage.html?stage=" + encodeURIComponent(prob.stage);
    }

    const s = prob.sections || {};
    addCard("الأعراض", s.symptoms || []);
    addCard("ليه ده بيحصل؟", s.why || []);
    addCard("الحل العملي", s.solution || []);
    addCard("ملاحظة", s.note || []);
  }
</script>
</body>
</html>
